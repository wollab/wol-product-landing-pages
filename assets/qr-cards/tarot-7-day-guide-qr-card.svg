<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Tarot of Learning QR card</title>
  <desc id="desc">QR card for the Tarot of Learning 7-day reflection guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.48" stop-color="#eaf7f6"/>
      <stop offset="1" stop-color="#d8f0ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="68%">
      <stop offset="0" stop-color="#fec566" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#fec566" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1a8586" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" rx="64" fill="url(#bg)"/>
  <rect width="1080" height="560" fill="url(#glow)"/>
  <circle cx="160" cy="180" r="8" fill="#fec566" opacity="0.8"/>
  <circle cx="900" cy="250" r="7" fill="#50c2c0" opacity="0.65"/>
  <circle cx="840" cy="1040" r="9" fill="#fec566" opacity="0.7"/>

  <text x="88" y="104" font-family="Kanit, Trebuchet MS, sans-serif" font-size="30" font-weight="600" fill="#1a8586" letter-spacing="4">WIZARDS OF LEARNING</text>
  <text x="88" y="198" font-family="Kanit, Trebuchet MS, sans-serif" font-size="68" font-weight="700" fill="#1a8586">Tarot of Learning</text>
  <text x="88" y="258" font-family="Kanit, Trebuchet MS, sans-serif" font-size="42" font-weight="600" fill="#d78600">สแกนเพื่อเริ่มไกด์ 7 วัน</text>
  <text x="88" y="314" font-family="Kanit, Trebuchet MS, sans-serif" font-size="29" font-weight="400" fill="#3f6e6d">เปิดไพ่วันละ 1 ใบ แล้วเปลี่ยน insight เป็น action เล็ก ๆ</text>

  <g filter="url(#shadow)">
    <rect x="78" y="390" width="924" height="820" rx="46" fill="rgba(255,255,255,0.82)" stroke="#50c2c0" stroke-opacity="0.35" stroke-width="3"/>
  </g>

  <image href="../images/tarot-learning-box.png" x="110" y="442" width="390" height="390" preserveAspectRatio="xMidYMid meet"/>
  <rect x="572" y="454" width="382" height="382" rx="34" fill="#ffffff" stroke="#1a8586" stroke-opacity="0.2" stroke-width="4"/>
  <image href="data:image/png;base64," x="602" y="484" width="322" height="322"/>

  <text x="118" y="894" font-family="Kanit, Trebuchet MS, sans-serif" font-size="36" font-weight="700" fill="#1a8586">ใช้คู่กับสำรับจริงได้ทันที</text>
  <text x="118" y="942" font-family="Kanit, Trebuchet MS, sans-serif" font-size="27" font-weight="400" fill="#3f6e6d">เหมาะสำหรับ journaling, self-reflection และการตั้งเป้าหมายการเรียนรู้</text>
  <rect x="118" y="992" width="844" height="92" rx="46" fill="#1a8586"/>
  <text x="540" y="1053" text-anchor="middle" font-family="Kanit, Trebuchet MS, sans-serif" font-size="34" font-weight="700" fill="#ffffff">SCAN TO START THE 7-DAY GUIDE</text>
  <text x="540" y="1160" text-anchor="middle" font-family="Kanit, Trebuchet MS, sans-serif" font-size="24" font-weight="400" fill="#3f6e6d">wollab.github.io/wol-product-landing-pages</text>
  <text x="540" y="1240" text-anchor="middle" font-family="Kanit, Trebuchet MS, sans-serif" font-size="28" font-weight="600" fill="#1a8586">Magic Your Communication, Make Learning Matter.</text>
</svg>
